<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bricks & Milestones — Earthscape</title>
<meta name="theme-color" content="#1B4965" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Sales Enhancer" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#EEF1F5;--surface:#FFFFFF;--ink:#152238;--soft:#5C6879;
    --line:#DCE2EA;--line2:#EAEEF3;
    --brand:#1B4965;--brand-ink:#12374d;--teal:#2C9C9A;
    --new:#6C7A93;--assigned:#4A6FA5;--qualified:#2C9C9A;
    --booked:#2E9E5B;--lost:#C0524A;--nq:#98A2B0;
    --amber:#D9982B;--over:#C0433A;
    --shadow:0 1px 2px rgba(21,34,56,.06),0 8px 24px rgba(21,34,56,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--canvas);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--line2) 1px,transparent 1px),linear-gradient(90deg,var(--line2) 1px,transparent 1px);background-size:26px 26px;background-position:-1px -1px;}
  .mono{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-.01em;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}

  /* ---------- Login ---------- */
  .auth{min-height:100vh;display:grid;place-items:center;padding:40px 20px;}
  .auth-card{width:min(440px,100%);background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:0 24px 60px rgba(21,34,56,.14);overflow:hidden;}
  .auth-top{padding:26px 28px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;}
  .mark{width:42px;height:42px;border-radius:11px;background:var(--brand);display:grid;place-items:center;color:#fff;flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);}
  .mark svg{width:23px;height:23px;}
  .auth-top b{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:-.02em;display:block;}
  .auth-top span{font-size:12px;color:var(--soft);font-weight:500;}
  .auth-body{padding:22px 28px 26px;}
  .auth-body>p{margin:0 0 16px;color:var(--soft);font-size:13.5px;}
  .userpick{display:flex;flex-direction:column;gap:9px;}
  .u-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:12px 14px;transition:border-color .12s,transform .1s;}
  .u-btn:hover{border-color:var(--brand);transform:translateY(-1px);}
  .u-av{width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:600;font-size:14px;flex:none;}
  .u-av.head{background:#12374d;}.u-av.ph{background:#4A6FA5;}.u-av.sales{background:#2C9C9A;}
  .u-meta b{font-family:'Space Grotesk';font-weight:600;font-size:15px;}
  .u-meta span{display:block;font-size:12px;color:var(--soft);}
  .u-flag{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--amber);background:#FBF3E1;padding:3px 8px;border-radius:20px;}
  .auth-field{margin-bottom:14px;}
  .auth-field label{font-size:12px;font-weight:600;color:var(--soft);display:block;margin-bottom:6px;}
  .auth-field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;outline:none;color:var(--ink);}
  .auth-field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(27,73,101,.12);}
  .auth-err{color:var(--lost);font-size:12.5px;margin:-4px 0 12px;min-height:16px;}
  .auth-actions{display:flex;gap:10px;}
  .auth-foot{padding:14px 28px;border-top:1px solid var(--line);font-size:11.5px;color:var(--soft);background:#F7F9FB;}
  .back{background:none;border:none;color:var(--soft);font-size:13px;font-weight:600;padding:0;margin-bottom:14px;}
  .back:hover{color:var(--brand);}

  /* ---------- Buttons ---------- */
  .btn{border:1px solid var(--brand);background:var(--brand);color:#fff;font-weight:600;padding:9px 15px;border-radius:9px;display:inline-flex;align-items:center;gap:7px;font-size:13.5px;transition:filter .15s;}
  .btn:hover{filter:brightness(1.08);}
  .btn svg{width:15px;height:15px;}
  .btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line);}
  .btn.ghost:hover{border-color:var(--brand);color:var(--brand);filter:none;}
  .btn.wide{width:100%;justify-content:center;}

  /* ---------- Header ---------- */
  header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .head-in{max-width:1360px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;}
  .logo{display:flex;align-items:center;gap:11px;}
  .logo .mark{width:34px;height:34px;border-radius:9px;}
  .logo .mark svg{width:19px;height:19px;}
  .logo b{font-family:'Space Grotesk';font-weight:700;font-size:16px;letter-spacing:-.02em;}
  .ctx{font-size:11.5px;color:var(--soft);font-weight:600;display:flex;align-items:center;gap:6px;}
  .ctx .chip{background:#EAF1F7;color:#2C5D80;padding:2px 9px;border-radius:20px;font-family:'Space Grotesk';}
  .search{margin-left:auto;position:relative;}
  .search input{width:210px;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:var(--surface);outline:none;color:var(--ink);}
  .search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(27,73,101,.12);}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--soft);}
  .whoami{display:flex;align-items:center;gap:9px;border-left:1px solid var(--line);padding-left:14px;}
  .whoami .u-av{width:32px;height:32px;font-size:12px;}
  .whoami .nm{font-family:'Space Grotesk';font-weight:600;font-size:13.5px;line-height:1.15;}
  .whoami .rl{font-size:11px;color:var(--soft);}
  .signout{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:7px 9px;color:var(--soft);font-size:12px;font-weight:600;}
  .signout:hover{border-color:var(--lost);color:var(--lost);}

  /* ---------- Tabs + KPIs ---------- */
  .band{max-width:1360px;margin:0 auto;padding:0 24px;}
  .tabs{display:flex;gap:4px;padding-top:16px;}
  .tab{border:none;background:transparent;color:var(--soft);font-weight:600;font-size:13.5px;padding:8px 14px;border-radius:8px 8px 0 0;}
  .tab.on{color:var(--brand);background:var(--surface);box-shadow:0 -1px 0 var(--line),1px 0 0 var(--line),-1px 0 0 var(--line);}
  .tab .n{font-family:'Space Grotesk';margin-left:6px;font-size:12px;color:var(--soft);}
  .tab.on .n{color:var(--brand);}
  .perm-note{max-width:1360px;margin:12px auto 0;padding:0 24px;}
  .perm-note .inner{background:#F1F5F9;border:1px solid var(--line);border-radius:10px;padding:9px 13px;font-size:12.5px;color:var(--soft);display:flex;align-items:center;gap:9px;}
  .perm-note b{color:var(--ink);}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:18px 0 8px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);}
  .kpi .lab{font-size:11.5px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px;}
  .kpi .lab i{width:8px;height:8px;border-radius:2px;flex:none;}
  .kpi .val{font-family:'Space Grotesk';font-weight:700;font-size:28px;margin-top:4px;letter-spacing:-.02em;}

  /* ---------- Board ---------- */
  main{max-width:1360px;margin:0 auto;padding:8px 24px 60px;}
  .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;}
  .col{flex:0 0 262px;display:flex;flex-direction:column;}
  .col-head{display:flex;align-items:center;gap:9px;padding:4px 4px 10px;}
  .col-head i{width:9px;height:9px;border-radius:3px;flex:none;}
  .col-head h3{font-size:13.5px;font-weight:600;}
  .col-head .ct{font-family:'Space Grotesk';font-size:12px;color:var(--soft);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 8px;margin-left:auto;}
  .stack{display:flex;flex-direction:column;gap:10px;min-height:60px;}
  .empty-col{border:1.5px dashed var(--line);border-radius:11px;padding:18px 12px;text-align:center;color:var(--soft);font-size:12.5px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;border-left:3px solid var(--l,var(--new));}
  .card:hover{transform:translateY(-2px);border-color:#cbd4df;box-shadow:0 4px 8px rgba(21,34,56,.08),0 14px 32px rgba(21,34,56,.09);}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card .nm{font-family:'Space Grotesk';font-weight:600;font-size:14.5px;}
  .card .proj{font-size:12px;color:var(--soft);margin-top:1px;}
  .src{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
  .src.digital{background:#EAF1F7;color:#2C5D80;}
  .src.walkin{background:#EEF3EC;color:#3E7A4E;}
  .card .meta{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap;}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;font-family:'Space Grotesk';}
  .avatar.none{background:#EAEEF3;color:var(--soft);border:1px dashed var(--line);}
  .budget{font-family:'Space Grotesk';font-size:12px;color:var(--ink);font-weight:600;margin-left:auto;}
  .pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px;display:inline-flex;align-items:center;gap:5px;}
  .pill svg{width:11px;height:11px;}
  .pill.due{background:#FBF3E1;color:#8A6410;}
  .pill.today{background:#FCEEDB;color:#9A5B12;}
  .pill.over{background:#FBE9E7;color:#A03027;}
  .reason-tag{font-size:11px;color:var(--soft);margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);}
  .reason-tag b{color:var(--ink);font-weight:600;}

  /* ---------- Follow-ups ---------- */
  .fu-wrap{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
  .fu-sec{padding:6px 4px;}
  .fu-sec>h3{padding:14px 18px 8px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);display:flex;align-items:center;gap:8px;}
  .fu-sec>h3 .b{font-family:'Space Grotesk';background:var(--canvas);border-radius:20px;padding:1px 9px;font-size:12px;}
  .fu-row{display:flex;align-items:center;gap:14px;padding:12px 18px;border-top:1px solid var(--line2);cursor:pointer;}
  .fu-row:hover{background:#F8FAFC;}
  .fu-row .date{font-family:'Space Grotesk';font-weight:600;width:96px;flex:none;}
  .fu-row .date small{display:block;font-size:11px;color:var(--soft);font-weight:500;}
  .fu-row .who{flex:1;min-width:0;}
  .fu-row .who b{font-family:'Space Grotesk';font-weight:600;}
  .fu-row .who span{color:var(--soft);font-size:12.5px;}
  .fu-row .note{flex:1.4;color:var(--soft);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fu-empty{padding:40px;text-align:center;color:var(--soft);}

  /* ---------- Table ---------- */
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);font-weight:600;padding:12px 16px;border-bottom:1px solid var(--line);background:#F7F9FB;}
  td{padding:12px 16px;border-bottom:1px solid var(--line2);font-size:13px;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:#F8FAFC;}
  .stg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-block;}

  /* ---------- Drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(21,34,56,.34);backdrop-filter:blur(2px);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(468px,94vw);background:var(--surface);z-index:70;box-shadow:-12px 0 40px rgba(21,34,56,.16);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .drawer.on{transform:translateX(0);}
  .dr-head{padding:20px 22px 16px;border-bottom:1px solid var(--line);}
  .dr-head .row1{display:flex;align-items:flex-start;gap:12px;}
  .dr-head h2{font-size:20px;}
  .dr-head .sub{color:var(--soft);font-size:13px;margin-top:2px;}
  .x{margin-left:auto;border:1px solid var(--line);background:var(--surface);width:32px;height:32px;border-radius:8px;color:var(--soft);font-size:17px;display:grid;place-items:center;flex:none;}
  .x:hover{border-color:var(--brand);color:var(--brand);}
  .dr-body{overflow-y:auto;padding:20px 22px 32px;flex:1;}
  .block{margin-bottom:22px;}
  .block>label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);font-weight:600;display:block;margin-bottom:9px;}
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;}
  .fact .k{font-size:11px;color:var(--soft);}
  .fact .v{font-weight:500;margin-top:1px;word-break:break-word;}
  .fact .v.mono{font-family:'Space Grotesk';}
  select.field,input.field,textarea.field{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);outline:none;}
  select.field:focus,input.field:focus,textarea.field:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(27,73,101,.12);}
  select.field:disabled,input.field:disabled{background:#F3F5F8;color:var(--soft);}
  textarea.field{resize:vertical;min-height:60px;}
  .stage-now{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:600;font-size:13.5px;padding:6px 12px;border-radius:20px;}
  .stage-now i{width:9px;height:9px;border-radius:3px;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;}
  .act{border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:13px;padding:8px 13px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;}
  .act:hover{border-color:var(--brand);}
  .act.q{border-color:var(--qualified);color:var(--qualified);}
  .act.q:hover{background:var(--qualified);color:#fff;}
  .act.win{border-color:var(--booked);color:var(--booked);}
  .act.win:hover{background:var(--booked);color:#fff;}
  .act.bad{border-color:var(--lost);color:var(--lost);}
  .act.bad:hover{background:var(--lost);color:#fff;}
  .act.del{border-color:var(--lost);color:var(--lost);}
  .act.del:hover{background:var(--lost);color:#fff;}
  .act svg{width:14px;height:14px;}
  .log{display:flex;flex-direction:column;gap:0;}
  .log-item{display:flex;gap:12px;padding:10px 0;}
  .log-item .dot{width:9px;height:9px;border-radius:50%;background:var(--brand);margin-top:5px;flex:none;position:relative;}
  .log-item .dot::after{content:'';position:absolute;left:4px;top:12px;width:1px;height:calc(100% + 8px);background:var(--line);}
  .log-item:last-child .dot::after{display:none;}
  .log-item .lt{font-family:'Space Grotesk';font-weight:600;font-size:12.5px;}
  .log-item .lb{color:var(--soft);font-size:12.5px;margin-top:1px;}
  .fu-form{background:var(--canvas);border:1px solid var(--line);border-radius:11px;padding:13px;margin-top:10px;}
  .fu-form .r{display:flex;gap:9px;margin-bottom:9px;}
  .banner{border-radius:10px;padding:11px 13px;font-size:13px;display:flex;gap:9px;align-items:flex-start;}
  .banner.win{background:#EAF5EE;color:#256b43;}
  .banner.lost{background:#FAECEA;color:#8f342c;}
  .banner.nq{background:#F1F3F6;color:#55606f;}
  .banner b{font-family:'Space Grotesk';}
  .locked-note{font-size:12px;color:var(--soft);background:#F3F5F8;border-radius:8px;padding:8px 11px;}
  /* temperature */
  .temp-seg{display:flex;gap:8px;}
  .temp-opt{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px;font-weight:600;font-size:13px;color:var(--soft);display:flex;align-items:center;justify-content:center;gap:7px;}
  .temp-opt .d{width:9px;height:9px;border-radius:50%;}
  .temp-opt.on{color:#fff;border-color:transparent;}
  .temp-opt.hot.on{background:#D9534F;} .temp-opt.warm.on{background:#E0A32E;} .temp-opt.cold.on{background:#4A8FB5;}
  .temp-opt.hot .d{background:#D9534F;} .temp-opt.warm .d{background:#E0A32E;} .temp-opt.cold .d{background:#4A8FB5;}
  .tchip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.03em;}
  .tchip.hot{background:#FBE7E6;color:#B23A36;} .tchip.warm{background:#FBF1DD;color:#9A6B12;} .tchip.cold{background:#E7F0F6;color:#356687;}
  /* likelihood gauge */
  .gauge{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:15px;}
  .gauge .num{font-family:'Space Grotesk';font-weight:700;font-size:34px;letter-spacing:-.02em;line-height:1;}
  .gauge .bar{height:9px;border-radius:20px;background:#E3E8EE;overflow:hidden;margin:11px 0 12px;}
  .gauge .fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .gauge .why{font-size:13px;color:var(--ink);}
  .gauge .signals{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .gauge .sig{font-size:11px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--soft);}
  .ai-tag{font-size:11px;color:var(--soft);display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .mini-link{background:none;border:none;color:var(--brand);font-weight:600;cursor:pointer;padding:0;font-size:11px;}
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
  @keyframes sp{to{transform:rotate(360deg);}}
  /* timeline notes */
  .tl-note{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:10px;padding:9px 12px;}
  .tl-note .q{font-size:13px;color:var(--ink);}
  .tl-by{font-size:11px;color:var(--soft);margin-top:3px;}
  /* stats */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow);}
  .stat .k{font-size:11px;color:var(--soft);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .stat .v{font-family:'Space Grotesk';font-weight:700;font-size:29px;margin-top:5px;letter-spacing:-.02em;}
  .stat .v small{font-size:13px;color:var(--soft);font-weight:500;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px;}
  .panel h3{font-size:14px;margin-bottom:15px;}
  .barrow{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .barrow .lbl{width:130px;font-size:13px;font-weight:500;flex:none;display:flex;align-items:center;gap:7px;}
  .barrow .lbl .d{width:9px;height:9px;border-radius:3px;flex:none;}
  .barrow .track{flex:1;height:22px;background:var(--canvas);border-radius:6px;overflow:hidden;}
  .barrow .fillb{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:9px;color:#fff;font-family:'Space Grotesk';font-size:12px;font-weight:600;min-width:22px;}
  .split{display:flex;gap:16px;} .split>*{flex:1;min-width:0;}
  .range-bar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:16px;}
  .range-bar .seg2{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}

const LOST_REASONS=['Went with a competitor','Price / negotiation gap','Postponed purchase','Went unresponsive','Location not suitable','Home loan rejected'];
const PAYMENT_STRUCTURES=['TES Pre EMI','Solcrest Payment Holiday','Normal CLP'];
const PHASES=['Phase 1','Phase 2'];

const DEFAULT_USERS=[
  {id:'head',   name:'You',    role:'sales_head',  title:'Sales Head',            project:null,        pass:null},
  {id:'sanyog', name:'Sanyog', role:'project_head',title:'Project Head · Earthscape',project:'Earthscape',pass:null},

];

let db={instance:INSTANCE,users:[],leads:[],transfers:[],crossInterest:[],pricingRequests:[],reportData:{}};

/* ============ cloud data layer (Supabase) ============ */
function projName(id){return projById[id]||null;}
function projId(name){return projByName[name]||null;}
function memberName(id){const u=user(id);return u?u.name:'';}
function titleFor(m){const p=projName(m.project_id);if(m.role==='sales_head')return 'Sales Head';if(m.role==='project_head')return 'Project Head'+(p?' · '+p:'');return 'Salesperson'+(p?' · '+p:'');}
function leadFromRow(r){return {id:r.id,name:r.name,phone:r.phone,email:r.email||'',source:r.source,srcDetail:r.src_detail||'',walkinSource:r.walkin_source||'',cpName:r.cp_name||'',location:r.location||'',company:r.company_name||'',project:projName(r.project_id),budget:r.budget||'',notes:r.notes||'',stage:r.stage,ownerId:r.owner_id||null,qualified:r.qualified,nqReason:r.nq_reason||'',disqualifiedBy:r.disqualified_by||'',lostReason:r.lost_reason||'',temp:r.temp||null,nextFollowUp:r.next_follow_up||null,assignedAt:r.assigned_at||null,createdAt:r.created_at,assessment:null,booking:r.booking||null,walkinPhase:r.walkin_phase||'',dealStatus:r.deal_status||'',metProjectHead:!!r.met_project_head,phMeetingDate:r.ph_meeting_date||'',labels:Array.isArray(r.labels)?r.labels:[],coOwners:Array.isArray(r.co_owners)?r.co_owners:[],priceOffered:r.price_offered||'',blocks:Array.isArray(r.blocks)?r.blocks:[],competitors:r.competitors||'',referralName:r.referral_name||'',referralLeadId:r.referral_lead_id||null,wwSuggested:!!r.wonderwall_suggested,wwVisited:!!r.wonderwall_visited,revisits:[],log:[]};}

async function loadAll(){
  const {data:projs}=await sb.from('projects').select('*');
  projById={};projByName={};(projs||[]).forEach(p=>{projById[p.id]=p.name;projByName[p.name]=p.id;});
  const {data:mem}=await sb.from('members').select('*');
  db.users=(mem||[]).map(m=>({id:m.id,name:m.name,role:m.role,project:projName(m.project_id),title:titleFor(m),email:m.email}));
  myCompanyId=(mem||[]).find(m=>m.id===session)?.company_id||null;
  myPrefs=(mem||[]).find(m=>m.id===session)?.prefs||{};
  await ensureProjects();
  const {data:leads}=await sb.from('leads').select('*');
  const rows=leads||[];const ids=rows.map(l=>l.id);
  let acts=[];
  if(ids.length){const {data:a}=await sb.from('lead_activity').select('*').in('lead_id',ids).order('created_at',{ascending:true});acts=a||[];}
  const byLead={};acts.forEach(a=>{(byLead[a.lead_id]=byLead[a.lead_id]||[]).push(a);});
  db.leads=rows.map(r=>{const L=leadFromRow(r);(byLead[r.id]||[]).forEach(a=>{const d=(a.created_at||'').slice(0,10);const by=memberName(a.author_id);L.log.push({t:a.body||'',d,kind:a.kind,by,next:a.next_follow_up||null});if(a.kind==='revisit'){const nt=/^Revisited \(visit #\d+\)$/.test(a.body||'')?'':(a.body||'');L.revisits.push({date:d,by,note:nt});}});return L;});
  const [{data:trs},{data:cis}]=await Promise.all([
    sb.from('transfer_requests').select('*').order('created_at',{ascending:false}),
    sb.from('cross_interest').select('*').order('created_at',{ascending:false})
  ]);
  db.transfers=trs||[];db.crossInterest=cis||[];
  const {data:prs}=await sb.from('pricing_requests').select('*').order('created_at',{ascending:false});
  db.pricingRequests=prs||[];
  const {data:comp}=await sb.from('companies').select('id,name,report_data').eq('id',myCompanyId).maybeSingle();
  db.company=comp||null;db.reportData=(comp&&comp.report_data)||{};

function can(action,lead){
  const u=currentUser();if(!u)return false;const r=u.role;
  switch(action){
    case 'create':return true;
    case 'delete':return r==='sales_head'||r==='project_head';
    case 'assign':return r==='sales_head'||r==='project_head';
    case 'view':case 'edit':
      if(r==='sales_head')return true;
      if(r==='project_head')return lead.project===u.project;
      return lead.ownerId===u.id||(Array.isArray(lead.coOwners)&&lead.coOwners.includes(u.id));
  }
  return false;
}

function nameMatch(a,b){a=nk(a);b=nk(b);if(!a||!b||a.length<3||b.length<3)return a===b;return a===b||a.startsWith(b)||b.startsWith(a);}

function downloadTemplate(){

function parseCSV(text){
  const rows=[];let field='',row=[],inQ=false;text=text.replace(/\r\n?/g,'\n');
  for(let i=0;i<text.length;i++){const c=text[i];
    if(inQ){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}
    else{if(c==='"')inQ=true;else if(c===','){row.push(field);field='';}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else field+=c;}
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
function parseTable(text){
  text=String(text||'').replace(/\r\n?/g,'\n');
  if(text.indexOf('\t')>=0){return text.split('\n').filter(l=>l.trim()!=='').map(l=>l.split('\t'));}
  return parseCSV(text);
}

function normHeader(h){return String(h||'').trim().toLowerCase().replace(/[\s_]+/g,'');}
function normDate(s){s=(s||'').trim();if(!s)return iso(today());
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m)return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return iso(today());
}

function buildBulk(text){

  const headers=rows[0].map(h=>HEADER_ALIAS[normHeader(h)]||normHeader(h));
  const idx={};headers.forEach((h,i)=>{if(idx[h]===undefined)idx[h]=i;});
  const get=(r,k)=>{const i=idx[k];return i===undefined?'':String(r[i]||'').trim();};
  const valid=[],errors=[];
  for(let r=1;r<rows.length;r++){const row=rows[r];

    if(!name){errors.push({line:r+1,why:'missing name'});continue;}
    let project=get(row,'project');const pM=PROJECTS.find(p=>p.toLowerCase()===project.toLowerCase());project=pM||PROJECTS[0];

  const acts=[];(data||[]).forEach((lead,i)=>{const v=bulkParsed[i]||{};const at=(v.created_at||iso(today()))+'T12:00:00';
    acts.push({company_id:myCompanyId,lead_id:lead.id,kind:'system',body:'Walk-in at '+(v.project||'')+' ('+(v.walkin_source==='CP'?('CP'+(v.cp_name?' · '+v.cp_name:'')):'Direct')+') — bulk import by '+me,author_id:session,created_at:at});

    if(q)acts.push({company_id:myCompanyId,lead_id:lead.id,kind:'system',body:'Marked qualified (bulk import)',author_id:session,created_at:at});});
  if(acts.length){for(let i=0;i<acts.length;i+=200){await sb.from('lead_activity').insert(acts.slice(i,i+200));}}

async function reconcileAgents(){
  const {data:leads}=await sb.from('leads').select('id,owner_id,notes,stage,created_at').is('owner_id',null).ilike('notes','Agent:%');
  let n=0;
  for(const l of (leads||[])){
    const m=(l.notes||'').match(/^Agent:\s*([^·]+?)(?:\s*·\s*|$)/);
    if(!m)continue;const nm=m[1].trim();
    const sp=db.users.find(u=>u.role==='sales'&&nameMatch(u.name,nm));
    if(!sp)continue;
    const cleaned=(l.notes||'').replace(/^Agent:\s*[^·]+?(?:\s*·\s*|$)/,'').trim();
    const {error}=await sb.from('leads').update({owner_id:sp.id,assigned_at:l.created_at,notes:cleaned}).eq('id',l.id);
    if(error)continue;
    await addActivityRow(l.id,{kind:'system',body:'Linked to '+sp.name+' from import'});n++;
  }
  await loadAll();await renderTeam();
  alert(n?('Attached '+n+' imported customer(s) to their agents.'):'No unassigned imports matched a current salesperson name. Create or rename the agents to match the sheet, then try again.');
}

/* ---- multi-filter builder ---- */
const FILTER_FIELDS=[
  {k:'stage',label:'Stage',type:'select',opts:()=>Object.keys(STAGES).map(s=>[s,STAGES[s].label])},
  {k:'source',label:'Source',type:'select',opts:()=>[['digital','Digital'],['walkin','Walk-in']]},
  {k:'walkin',label:'Walk-in via',type:'select',opts:()=>[['Direct','Direct'],['CP','Channel Partner']]},
  {k:'dstatus',label:'Deal status',type:'select',opts:()=>DEAL_STATUSES.map(s=>[s,s])},
  {k:'metph',label:'Met Project Head',type:'select',opts:()=>[['yes','Yes'],['no','No']]},
  {k:'phase',label:'Phase',type:'select',opts:()=>PHASES.map(p=>[p,p])},
  {k:'project',label:'Project',type:'select',opts:()=>PROJECTS.map(p=>[p,p])},
  {k:'owner',label:'Owner',type:'select',opts:()=>salespeople().map(u=>[u.id,u.name])},
  {k:'followup',label:'Follow-up',type:'select',opts:()=>[['due','Due / overdue'],['upcoming','Upcoming'],['none','No date set']]},
  {k:'revisits',label:'Has revisits',type:'select',opts:()=>[['yes','Yes'],['no','No']]},
  {k:'name',label:'Name contains',type:'text'},
  {k:'phone',label:'Phone contains',type:'text'},
  {k:'company',label:'Company contains',type:'text'},
  {k:'cp',label:'CP name contains',type:'text'},
  {k:'budget',label:'Budget contains',type:'text'},
  {k:'comment',label:'Comment contains',type:'text'},
  {k:'label',label:'Label',type:'text'},
  {k:'block',label:'Block interest',type:'select',opts:()=>['A','B','C','D','E','F'].map(b=>[b,b])},
  {k:'competitor',label:'Competitor contains',type:'text'},
  {k:'wwsug',label:'Wonderwall suggested',type:'select',opts:()=>[['yes','Yes'],['no','No']]},
  {k:'wwvis',label:'Wonderwall visited',type:'select',opts:()=>[['yes','Yes'],['no','No']]}
];
function fieldMeta(k){return FILTER_FIELDS.find(f=>f.k===k)||FILTER_FIELDS[0];}
function inc(a,v){return String(a||'').toLowerCase().includes(String(v||'').toLowerCase());}
function matchFilter(l,f){const v=f.value;switch(f.field){
  case 'stage':return l.stage===v;
  case 'source':return l.source===v;
  case 'walkin':return (l.walkinSource||'')===v;
  case 'dstatus':return (l.dealStatus||'')===v;
  case 'metph':return v==='yes'?!!l.metProjectHead:!l.metProjectHead;
  case 'comment':return (l.log||[]).some(e=>inc(e.t,v));
  case 'label':return (l.labels||[]).some(x=>inc(x,v));
  case 'block':return (l.blocks||[]).includes(v);
  case 'competitor':return inc(l.competitors,v);
  case 'wwsug':return v==='yes'?!!l.wwSuggested:!l.wwSuggested;
  case 'wwvis':return v==='yes'?!!l.wwVisited:!l.wwVisited;
  case 'phase':return (l.walkinPhase||'')===v;
  case 'project':return l.project===v;
  case 'owner':return (l.ownerId||'')===v;
  case 'followup':return v==='due'?(l.stage==='qualified'&&l.nextFollowUp&&dueState(l.nextFollowUp).n<=0):v==='upcoming'?(l.stage==='qualified'&&l.nextFollowUp&&dueState(l.nextFollowUp).n>0):v==='none'?(l.stage==='qualified'&&!l.nextFollowUp):true;
  case 'revisits':return v==='yes'?((l.revisits||[]).length>0):((l.revisits||[]).length===0);
  case 'name':return inc(l.name,v);
  case 'phone':return inc(l.phone,v);
  case 'company':return inc(l.company,v);
  case 'cp':return inc(l.cpName,v);
  case 'budget':return inc(l.budget,v);
  default:return true;}}
function activeFilters(){return filters.filter(f=>f.field&&f.value!=='');}
function passesFilters(l){const a=activeFilters();if(!a.length)return true;return filterMode==='AND'?a.every(f=>matchFilter(l,f)):a.some(f=>matchFilter(l,f));}
function openFilters(){document.getElementById('filterScrim').classList.add('on');renderFilterBuilder();}
function closeFilters(){document.getElementById('filterScrim').classList.remove('on');}
function renderFilterBuilder(){
  if(!filters.length)filters=[{field:'stage',value:''}];
  const fields=FILTER_FIELDS.filter(f=>f.k!=='owner'||currentUser().role!=='sales');
  const row=(f,i)=>{const meta=fieldMeta(f.field);let val;
    if(meta.type==='text')val=`<input class="field" placeholder="type text…" value="${(f.value||'').replace(/"/g,'&quot;')}" oninput="filters[${i}].value=this.value"/>`;
    else val=`<select class="field" onchange="filters[${i}].value=this.value">${['<option value=\"\">any…</option>',...meta.opts().map(o=>`<option value="${o[0]}" ${f.value===o[0]?'selected':''}>${o[1]}</option>`)].join('')}</select>`;
    return `<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <select class="field" style="max-width:170px" onchange="filters[${i}].field=this.value;filters[${i}].value='';renderFilterBuilder()">${fields.map(fd=>`<option value="${fd.k}" ${f.field===fd.k?'selected':''}>${fd.label}</option>`).join('')}</select>
      ${val}<button class="x" style="flex:none" onclick="filters.splice(${i},1);renderFilterBuilder()">✕</button></div>`;};
  const saved=savedFilters();
  const savedHTML=saved.length?`<div class="block"><label>Saved filters</label>${saved.map((sf,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><button class="btn ghost" style="flex:1;justify-content:flex-start" onclick="applySaved(${i})">${sf.name}<span style="color:var(--soft);font-weight:400;margin-left:8px">· ${sf.filters.length} filter${sf.filters.length===1?'':'s'} · ${sf.mode}</span></button><button class="x" onclick="deleteSaved(${i})">✕</button></div>`).join('')}</div>`:'';
  document.getElementById('filterBody').innerHTML=`${savedHTML}
    <div class="block"><label>Match</label><div class="seg" style="max-width:300px"><button class="${filterMode==='AND'?'on':''}" onclick="filterMode='AND';renderFilterBuilder()">ALL of these (AND)</button><button class="${filterMode==='OR'?'on':''}" onclick="filterMode='OR';renderFilterBuilder()">ANY of these (OR)</button></div></div>
    <div class="block"><label>Filters</label>${filters.map(row).join('')}<button class="btn ghost" onclick="filters.push({field:'stage',value:''});renderFilterBuilder()">＋ Add a filter</button></div>
    <div class="block"><label>Save this filter</label><div style="display:flex;gap:8px"><input class="field" id="sf_name" placeholder="e.g. Hot walk-ins to call"/><button class="btn" onclick="saveCurrentFilter()">Save</button></div></div>`;
}

async function saveCurrentFilter(){
  const name=(document.getElementById('sf_name').value||'').trim();if(!name){alert('Name your filter first.');return;}
  const a=activeFilters();if(!a.length){alert('Add at least one filter to save.');return;}
  const list=savedFilters().slice();list.push({name,mode:filterMode,filters:JSON.parse(JSON.stringify(a))});

}
function applySaved(i){const sf=savedFilters()[i];if(!sf)return;filters=JSON.parse(JSON.stringify(sf.filters));filterMode=sf.mode||'AND';closeFilters();render();}
async function deleteSaved(i){const list=savedFilters().slice();list.splice(i,1);if(await savePrefs(Object.assign({},myPrefs,{savedFilters:list}))){renderFilterBuilder();render();}}
function renderSavedBar(){
  const el=document.getElementById('savedBar');if(!el)return;

}

  if(l.stage==='lost'&&l.lostReason)reason=`<div class="reason-tag">Lost · <b>${l.lostReason}</b></div>`;
  return `<div class="card" style="--l:${st.color}" onclick="openDrawer('${l.id}')">
    <div class="top"><div><div class="nm">${l.name}</div><div class="proj">${l.project||'—'}</div></div><span class="src ${l.source}">${l.source==='digital'?'Digital':'Walk-in'}</span></div>
    <div class="meta">${l.ownerId?`<div class="avatar" title="${userName(l.ownerId)}">${initials(userName(l.ownerId))}</div>`:`<div class="avatar none" title="Unassigned">–</div>`}${l.dealStatus?`<span class="tchip" style="background:#E7EEF5;color:#2C5D80">${l.dealStatus}</span>`:''}${(l.metProjectHead===false&&(l.revisits&&l.revisits.length))?`<span class="tchip" style="background:#FBE9E7;color:#A03027" title="Revisited but no Project-Head meeting">No PH mtg</span>`:''}${(l.revisits&&l.revisits.length)?`<span class="tchip" style="background:#EDE7F6;color:#5E35B1">↩ ${l.revisits.length}</span>`:''}${(l.labels||[]).map(n=>`<span class="lchip" style="background:${labelColor(n)}">${n}</span>`).join('')}${slaHTML}${dueHTML}${l.budget?`<span class="budget">₹${l.budget}</span>`:''}</div>
    ${reason}</div>`;
}
function boardHTML(leads){
  return `<div class="board">`+BOARD_ORDER.map(s=>{const items=leads.filter(l=>l.stage===s);
    return `<div class="col"><div class="col-head"><i style="background:${STAGES[s].color}"></i><h3>${STAGES[s].label}</h3><span class="ct">${items.length}</span></div>
    <div class="stack">${items.length?items.map(cardHTML).join(''):'<div class="empty-col">Nothing here</div>'}</div></div>`;}).join('')+`</div>`;
}
function followupsHTML(leads){
  const due=leads.filter(l=>l.stage==='qualified'&&l.nextFollowUp).sort((a,b)=>parseD(a.nextFollowUp)-parseD(b.nextFollowUp));
  const groups={over:[],today:[],upcoming:[]};
  due.forEach(l=>{const d=dueState(l.nextFollowUp);groups[d.cls==='over'?'over':d.cls==='today'?'today':'upcoming'].push(l);});
  const noFU=leads.filter(l=>l.stage==='qualified'&&!l.nextFollowUp);
  const sec=(title,arr)=>arr.length?`<div class="fu-sec"><h3>${title}<span class="b">${arr.length}</span></h3>`+arr.map(l=>{const last=l.log[l.log.length-1];
    return `<div class="fu-row" onclick="openDrawer('${l.id}')"><div class="date">${fmtDate(l.nextFollowUp)}<small>${parseD(l.nextFollowUp).toLocaleDateString('en-IN',{weekday:'short'})}</small></div>
    <div class="who"><b>${l.name}</b><br><span>${userName(l.ownerId)} · ${l.project||'—'}</span></div><div class="note">${last?last.t:''}</div></div>`;}).join('')+`</div>`:'';
  let inner=sec('Overdue',groups.over)+sec('Today',groups.today)+sec('Upcoming',groups.upcoming)+sec('No date set',noFU);
  if(!inner)inner='<div class="fu-empty">No follow-ups scheduled. Qualified leads with a next-contact date show up here as reminders.</div>';
  return `<div class="fu-wrap">${inner}</div>`;
}
function tableHTML(leads){
  const rows=leads.slice().sort((a,b)=>parseD(b.createdAt)-parseD(a.createdAt)).map(l=>{const st=STAGES[l.stage];
    return `<tr onclick="openDrawer('${l.id}')"><td><b class="mono">${l.name}</b><br><span style="color:var(--soft);font-size:12px">${l.phone}</span></td>
    <td><span class="src ${l.source}">${l.source==='digital'?'Digital':'Walk-in'}</span><br><span style="color:var(--soft);font-size:12px">${l.srcDetail}</span></td>
    <td>${l.project||'—'}</td><td>${l.ownerId?userName(l.ownerId):'<span style="color:var(--soft)">Unassigned</span>'}</td>
    <td><span class="stg" style="background:${st.color}22;color:${st.color}">${st.label}</span></td>
    <td class="mono">${l.stage==='qualified'&&l.nextFollowUp?fmtDate(l.nextFollowUp):'—'}</td><td class="mono">${l.budget?'₹'+l.budget:'—'}</td></tr>`;}).join('');
  return `<table><thead><tr><th>Lead</th><th>Source</th><th>Project</th><th>Owner</th><th>Stage</th><th>Next follow-up</th><th>Budget</th></tr></thead><tbody>${rows||'<tr><td colspan=7 style="text-align:center;color:var(--soft);padding:30px">No leads yet.</td></tr>'}</tbody></table>`;
}

/* ============ drawer ============ */
function openDrawer(id){openId=id;renderDrawer();document.getElementById('scrim').classList.add('on');document.getElementById('drawer').classList.add('on');}
function closeDrawer(){openId=null;document.getElementById('scrim').classList.remove('on');document.getElementById('drawer').classList.remove('on');}
function getLead(){return db.leads.find(l=>l.id===openId);}
function renderDrawer(){
  const l=getLead();if(!l)return;
  const u=currentUser();const st=STAGES[l.stage];
  const editable=can('edit',l);const canAssign=can('assign');const canDelete=can('delete');
  const facts=[['Phone',l.phone,true],['Email',l.email||'—',false],['Source',(l.source==='digital'?'Digital · ':'Walk-in · ')+l.srcDetail,false],['Project',l.project||'—',false]];
  if(l.source==='walkin'){facts.push(['Walk-in via',l.walkinSource==='CP'?('CP · '+(l.cpName||'—')):l.walkinSource==='Referral'?('Referral'+(l.referralName?' · '+l.referralName:'')):'Direct',false]);if(l.referralLeadId){const rl=db.leads.find(x=>x.id===l.referralLeadId);facts.push(['Referrer in system',rl?rl.name:'—',false]);}facts.push(['Phase',l.walkinPhase||'—',false]);facts.push(['Location',l.location||'—',false]);facts.push(['Company',l.company||'—',false]);}
  facts.push(['Budget',l.budget?'₹'+l.budget:'—',true]);facts.push(['Captured',fmtDate(l.createdAt),true]);
  let flow='';
  const terminal=['booked','lost','not_qualified'].includes(l.stage);
  if(editable&&!terminal){
    // owner
    if(canAssign){
      flow+=`<div class="block"><label>Owner</label><select class="field" onchange="assign('${l.id}',this.value)"><option value="">Unassigned</option>${salespeople(l.project).map(r=>`<option value="${r.id}" ${l.ownerId===r.id?'selected':''}>${r.name}</option>`).join('')}</select></div>`;
    } else {
      flow+=`<div class="block"><label>Owner</label><div class="locked-note">Owned by you (${userName(l.ownerId)}). Salespeople can't reassign leads.</div></div>`;
    }
    flow+=shareBlock(l);
    if(l.qualified!==true){
      flow+=`<div class="block"><label>Qualify this lead</label><div class="actions">
        <button class="act q" onclick="qualify('${l.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Mark qualified</button>
        <select class="field" style="width:auto;flex:1" onchange="disqualify('${l.id}',this.value)"><option value="">Not qualified — reason…</option>${NQ_REASONS.map(r=>`<option>${r}</option>`).join('')}</select></div></div>`;
    }
    if(l.qualified===true){
      flow+=dealStatusBlock(l);
    }
    flow+=metPHBlock(l);
    flow+=wonderwallBlock(l);
    flow+=salesInfoBlock(l);
    flow+=pricingBlock(l);
    flow+=followBlock(l);
    flow+=interestBlock(l);
    flow+=handoffBlock(l);
  } else if(terminal){
    if(l.stage==='booked'){flow+=`<div class="block"><div class="banner win"><span>🎉</span><div>Won — <b>${l.dealStatus||'Booked'}</b>.</div></div></div>`;flow+=bookingFactsHTML(l);flow+=wonderwallBlock(l);if(editable)flow+=dealStatusBlock(l);}
    if(l.stage==='lost'){flow+=`<div class="block"><div class="banner lost"><span>✕</span><div>Lost — <b>${l.lostReason||l.dealStatus||'Closed Lost'}</b></div></div></div>`;flow+=wonderwallBlock(l);if(editable)flow+=dealStatusBlock(l);}
    if(l.stage==='not_qualified'){flow+=`<div class="block"><div class="banner nq"><span>–</span><div>Disqualified — <b>${l.nqReason}</b>${l.disqualifiedBy?' · by '+l.disqualifiedBy:''}. Now in the disqualified pool.</div></div></div>`;
      if(can('assign'))flow+=`<div class="block"><label>Reassign for follow-up</label><select class="field" onchange="reassignPool('${l.id}',this.value)"><option value="">Assign to a salesperson…</option>${salespeople(l.project).map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select><div class="ai-tag">Moves this disqualified walk-in out of the pool into the chosen rep's active bucket for a fresh follow-up.</div></div>`;}
    if(editable&&l.stage!=='not_qualified')flow+=`<div class="block"><button class="act" onclick="reopen('${l.id}')">↺ Reopen lead</button></div>`;
  }
  // delete (privileged only)
  if(canDelete){
    flow+=`<div class="block"><button class="act del" onclick="deleteLead('${l.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>Delete ${l.source==='walkin'?'walk-in':'lead'}</button></div>`;
  } else if(u.role==='sales'){
    flow+=`<div class="block"><div class="locked-note">You can enter and edit this ${l.source==='walkin'?'walk-in':'lead'}, but only a Project Head or Sales Head can delete it.</div></div>`;
  }

  document.getElementById('drawer').innerHTML=`
    <div class="dr-head"><div class="row1"><div><h2>${l.name}</h2><div class="sub">${l.phone}</div></div><button class="x" onclick="closeDrawer()">✕</button></div>
      <div style="margin-top:12px"><span class="stage-now" style="background:${st.color}1c;color:${st.color}"><i style="background:${st.color}"></i>${st.label}</span></div></div>
    <div class="dr-body">
      <div class="block"><div class="facts">${facts.map(([k,v,m])=>`<div class="fact"><div class="k">${k}</div><div class="v ${m?'mono':''}">${v}</div></div>`).join('')}</div></div>
      ${visitsBlock(l)}
      ${labelsBlock(l)}
      ${phaseBlock(l)}
      ${u.role==='sales_head'&&l.source==='walkin'?editWalkinBlock(l):''}
      ${flow}
      <div class="block"><label>Follow-up history &amp; comments</label>${timelineHTML(l)}</div>
    </div>`;
}
function followBlock(l){
  const d=l.nextFollowUp?dueState(l.nextFollowUp):null;
  const badge=d?`<span class="pill ${d.cls}" style="margin-left:8px">${clock}${d.cls==='over'?'Overdue':d.cls==='today'?'Today':fmtDate(l.nextFollowUp)}</span>`:'';
  return `<div class="block"><label>Add a note</label>
    <div class="fu-form">
      <textarea class="field" id="note_text" placeholder="Write an update or comment…"></textarea>
      <div style="margin-top:9px"><button class="btn" onclick="addNote('${l.id}')">＋ Add note</button></div>
    </div>
    <label style="margin-top:18px">Set up a follow-up ${badge}</label>
    <div class="fu-form">
      <textarea class="field" id="fu_note" placeholder="What's the plan for next contact?"></textarea>
      <div class="r" style="margin-top:9px;align-items:center;gap:9px"><span style="font-size:12.5px;color:var(--soft);white-space:nowrap">Remind on</span><input type="date" class="field" style="max-width:175px" id="fu_date" value="${l.nextFollowUp||iso(today())}"/><button class="btn" style="white-space:nowrap" onclick="logFollowUp('${l.id}')">Set follow-up</button></div>
    </div></div>`;
}
async function addNote(id){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;const t=document.getElementById('note_text').value.trim();if(!t)return;await addActivityRow(id,{kind:'note',body:t});await refresh();}

/* ============ mutations ============ */
async function assign(id,repId){if(!can('assign'))return;const l=db.leads.find(x=>x.id===id);const was=l.ownerId;const patch={owner_id:repId||null};if(repId&&l.stage==='new')patch.stage='assigned';if(repId&&repId!==was)patch.assigned_at=iso(today());if(!await updateLead(id,patch))return;if(repId&&repId!==was)await addActivityRow(id,{kind:'system',body:'Assigned to '+userName(repId)});await refresh();}
async function qualify(id){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;const nf=l.nextFollowUp||addDays(3);if(!await updateLead(id,{qualified:true,stage:'qualified',next_follow_up:nf}))return;await addActivityRow(id,{kind:'system',body:'Marked qualified'});await refresh();}
async function disqualify(id,reason){if(!reason)return;const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;if(!await updateLead(id,{qualified:false,stage:'not_qualified',nq_reason:reason,disqualified_by:currentUser().name,owner_id:null}))return;await addActivityRow(id,{kind:'system',body:'Disqualified — '+reason+' (moved to disqualified pool)'});await refresh();}
async function logFollowUp(id){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;const date=document.getElementById('fu_date').value;const note=document.getElementById('fu_note').value.trim();if(!note&&!date)return;if(date){if(!await updateLead(id,{next_follow_up:date}))return;}await addActivityRow(id,{kind:'note',body:note||'Followed up',next:date||null});await refresh();}
async function setTemp(id,t){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;if(l.temp===t){if(!await updateLead(id,{temp:null}))return;await addActivityRow(id,{kind:'system',body:'Cleared temperature'});}else{if(!await updateLead(id,{temp:t}))return;await addActivityRow(id,{kind:'system',body:'Marked as '+t+' lead'});}await refresh();}
function dealStatusBlock(l){
  const cur=l.dealStatus||'';const seg=s=>`<button class="act ${cur===s?'ds-on':''}" onclick="setDealStatus('${l.id}','${s}')">${s}</button>`;
  return `<div class="block"><label>Deal status${cur?` · <span style="color:var(--ink)">${cur}</span>`:''}</label>
    <div class="actions">
      ${seg('Prospect')}${seg('Negotiation')}
      <button class="act ${cur==='Booked'?'ds-on':''}" onclick="openBooking('${l.id}','Booked')">Booked</button>
      <button class="act win ${cur==='Closed Won'?'ds-on':''}" onclick="openBooking('${l.id}','Closed Won')">Closed Won</button>
      <select class="field" style="width:auto;flex:1" onchange="closedLost('${l.id}',this.value)"><option value="">Closed Lost — reason…</option>${LOST_REASONS.map(r=>`<option ${l.lostReason===r?'selected':''}>${r}</option>`).join('')}</select>
    </div></div>`;
}
async function setDealStatus(id,s){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;const patch={deal_status:s,stage:'qualified'};if(s==='Prospect'||s==='Negotiation')patch.lost_reason='';if(!await updateLead(id,patch))return;await addActivityRow(id,{kind:'system',body:'Deal status → '+s});await refresh();}
async function closedLost(id,reason){if(!reason)return;const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;if(!await updateLead(id,{stage:'lost',deal_status:'Closed Lost',lost_reason:reason,next_follow_up:null}))return;await addActivityRow(id,{kind:'system',body:'Closed Lost — '+reason});await refresh();}
function metPHBlock(l){
  const u=currentUser();const canSet=(u.role==='sales'||u.role==='sales_head');const done=l.metProjectHead;
  if(!canSet)return `<div class="block"><label>Met Project Head</label><div class="locked-note">${done?('✅ Met'+(l.phMeetingDate?' on '+fmtDate(l.phMeetingDate):'')):'❌ Not yet — you can’t change this (it’s a check on the Project Head).'}</div></div>`;
  return `<div class="block"><label>Met Project Head</label>
    <label style="display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:normal;font-size:14px;color:var(--ink);cursor:pointer"><input type="checkbox" style="width:17px;height:17px" ${done?'checked':''} onchange="toggleMetPH('${l.id}',this.checked)"/> Customer met the Project Head</label>
    ${done?`<div class="fu-form" style="margin-top:8px"><div class="r" style="margin-bottom:0;gap:9px;align-items:center"><span style="font-size:12.5px;color:var(--soft)">Meeting date</span><input type="date" class="field" style="max-width:175px" value="${l.phMeetingDate||iso(today())}" onchange="setPHDate('${l.id}',this.value)"/></div></div>`:''}</div>`;
}
async function toggleMetPH(id,checked){const l=db.leads.find(x=>x.id===id);if(!can('edit',l)||currentUser().role==='project_head')return;if(!await updateLead(id,{met_project_head:checked,ph_meeting_date:checked?(l.phMeetingDate||iso(today())):null}))return;await addActivityRow(id,{kind:'system',body:checked?'Marked: met Project Head':'Unmarked: met Project Head'});await refresh();}
async function setPHDate(id,v){const l=db.leads.find(x=>x.id===id);if(!can('edit',l)||currentUser().role==='project_head')return;if(!await updateLead(id,{ph_meeting_date:v||null}))return;await refresh();}
function shareBlock(l){
  const u=currentUser();const isOwner=l.ownerId===u.id;const canShare=isOwner||u.role==='sales_head'||u.role==='project_head';
  const co=Array.isArray(l.coOwners)?l.coOwners:[];
  const chips=co.map(id=>`<span class="lchip" style="background:#4A6FA5">${userName(id)}${canShare?`<span class="rm" onclick="removeCoOwner('${l.id}','${id}')">✕</span>`:''}</span>`).join(' ');
  if(!canShare)return co.length?`<div class="block"><label>Shared owners</label><div style="display:flex;flex-wrap:wrap;gap:6px">${chips}</div></div>`:'';
  const avail=salespeople(l.project).filter(r=>r.id!==l.ownerId&&!co.includes(r.id));
  return `<div class="block"><label>Shared owners</label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${chips||'<span style="color:var(--soft);font-size:12.5px">Not shared</span>'}</div>
    ${avail.length?`<div class="fu-form"><div class="r" style="gap:8px;margin-bottom:0"><select class="field" id="co_${l.id}">${avail.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select><button class="btn" style="white-space:nowrap" onclick="addCoOwnerPick('${l.id}')">Share</button></div><div class="ai-tag" style="margin-top:8px">Both owners get equal access to this ${l.source==='walkin'?'walk-in':'lead'}.</div></div>`:''}</div>`;
}
async function addCoOwner(id,memberId){const l=db.leads.find(x=>x.id===id);if(!memberId||!can('edit',l))return;const co=Array.isArray(l.coOwners)?l.coOwners.slice():[];if(co.includes(memberId)||memberId===l.ownerId)return;co.push(memberId);if(!await updateLead(id,{co_owners:co}))return;await addActivityRow(id,{kind:'system',body:'Shared with '+userName(memberId)});await refresh();}
function addCoOwnerPick(id){const v=(document.getElementById('co_'+id)||{}).value;if(v)addCoOwner(id,v);}
async function removeCoOwner(id,memberId){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;const co=(l.coOwners||[]).filter(x=>x!==memberId);if(!await updateLead(id,{co_owners:co}))return;await addActivityRow(id,{kind:'system',body:'Unshared with '+userName(memberId)});await refresh();}
function salesInfoBlock(l){
  const blocks=Array.isArray(l.blocks)?l.blocks:[];const BL=['A','B','C','D','E','F'];
  return `<div class="block"><label>Deal details</label>
    <div class="fu-form">
      <div class="r" style="gap:9px;align-items:center;margin-bottom:10px"><span style="font-size:12.5px;color:var(--soft);white-space:nowrap;min-width:96px">Price offered ₹</span><input class="field" id="po_${l.id}" value="${(l.priceOffered||'').replace(/"/g,'&quot;')}" placeholder="e.g. 1.85 Cr" onchange="setPriceOffered('${l.id}',this.value)"/></div>
      <div style="margin-bottom:10px"><div style="font-size:12.5px;color:var(--soft);margin-bottom:6px">Block(s) of interest</div><div class="actions">${BL.map(b=>`<button class="act ${blocks.includes(b)?'ds-on':''}" style="min-width:42px;justify-content:center" onclick="toggleBlock('${l.id}','${b}')">${b}</button>`).join('')}</div></div>
      <div class="r" style="gap:9px;align-items:center"><span style="font-size:12.5px;color:var(--soft);white-space:nowrap;min-width:96px">Competitors</span><input class="field" id="cmp_${l.id}" value="${(l.competitors||'').replace(/"/g,'&quot;')}" placeholder="e.g. Prestige, Sobha" onchange="setCompetitors('${l.id}',this.value)"/></div>
    </div></div>`;
}
async function setPriceOffered(id,v){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;v=(v||'').trim();if(v===(l.priceOffered||''))return;if(!await updateLead(id,{price_offered:v||null}))return;await addActivityRow(id,{kind:'system',body:'Price offered: '+(v?'₹'+v:'cleared')});await refresh();}
async function toggleBlock(id,b){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;const cur=Array.isArray(l.blocks)?l.blocks.slice():[];const i=cur.indexOf(b);if(i>=0)cur.splice(i,1);else cur.push(b);cur.sort();if(!await updateLead(id,{blocks:cur}))return;await addActivityRow(id,{kind:'system',body:'Block interest: '+(cur.join(', ')||'none')});await refresh();}
async function setCompetitors(id,v){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;v=(v||'').trim();if(v===(l.competitors||''))return;if(!await updateLead(id,{competitors:v||null}))return;await addActivityRow(id,{kind:'system',body:'Competitor(s): '+(v||'cleared')});await refresh();}
/* ---- Wonderwall (finished project) tracking ---- */
function wonderwallBlock(l){
  const editable=can('edit',l);const sug=l.wwSuggested,vis=l.wwVisited;
  if(!editable)return (sug||vis)?`<div class="block"><label>Wonderwall</label><div class="locked-note">${sug?'✅ Suggested':'❌ Not suggested'}${vis?' · ✅ Visited':''}</div></div>`:'';
  const chk='width:17px;height:17px';const lab='display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:normal;font-size:14px;color:var(--ink);cursor:pointer;margin-bottom:7px';
  return `<div class="block"><label>Wonderwall — finished project</label>
    <label style="${lab}"><input type="checkbox" style="${chk}" ${sug?'checked':''} onchange="setWonderwall('${l.id}','suggested',this.checked)"/> Suggested Wonderwall to the customer</label>
    <label style="${lab};margin-bottom:0"><input type="checkbox" style="${chk}" ${vis?'checked':''} onchange="setWonderwall('${l.id}','visited',this.checked)"/> Customer visited Wonderwall</label>
    <div class="ai-tag" style="margin-top:8px">Propose Wonderwall on the first visit — visiting it lifts conversion.</div></div>`;
}
async function setWonderwall(id,which,checked){const l=db.leads.find(x=>x.id===id);if(!can('edit',l))return;
  const patch=which==='suggested'?{wonderwall_suggested:checked}:{wonderwall_visited:checked};
  if(which==='visited'&&checked&&!l.wwSuggested)patch.wonderwall_suggested=true;
  if(!await updateLead(id,patch))return;
  await addActivityRow(id,{kind:'system',body:which==='suggested'?(checked?'Suggested Wonderwall':'Cleared Wonderwall suggested'):(checked?'Customer visited Wonderwall':'Cleared Wonderwall visited')});

async function assessLikelihood(id){
  const l=db.leads.find(x=>x.id===id);if(!l)return;
  const btn=document.getElementById('assessBtn');
  const notes=l.log.filter(e=>e.kind==='note');
  const comments=notes.length?notes.map(e=>`(${fmtDate(e.d)}) ${e.by}: ${e.t}`).join('\n'):'No follow-up comments logged yet.';
  const ctx=`Customer: ${l.name}. Project: ${l.project}. Source: ${l.source==='walkin'?'walk-in':'digital lead'}. Budget: ${l.budget||'unknown'}. Salesperson-set temperature: ${l.temp||'unset'}.`;
  if(btn){btn.innerHTML='<span class="spin"></span> Reading comments…';btn.disabled=true;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:1000,
      messages:[{role:'user',content:`You are a real estate sales analyst. From the salesperson's follow-up comments, estimate how likely this customer is to close (buy an apartment).\n\n${ctx}\n\nFollow-up comments (oldest to newest):\n${comments}\n\nReturn ONLY a JSON object, no markdown fences or preamble, with keys:\n"likelihood": integer 0-100,\n"temperature": one of "Hot","Warm","Cold",\n"rationale": one concise sentence (max 24 words) explaining the score,\n"signals": array of up to 4 short 2-4 word phrases drawn from the comments that drove the score.\nIf there are no comments, give a low-confidence estimate based on source and budget.`}]
    })});
    const data=await res.json();
    let text=data.content.filter(i=>i.type==='text').map(i=>i.text).join('').replace(/\`\`\`json|\`\`\`/g,'').trim();
    const p=JSON.parse(text);
    l.assessment={likelihood:Math.max(0,Math.min(100,parseInt(p.likelihood)||0)),temperature:['Hot','Warm','Cold'].includes(p.temperature)?p.temperature:'Warm',rationale:p.rationale||'',signals:Array.isArray(p.signals)?p.signals.slice(0,4):[],at:iso(today())};
    if(!l.temp)l.temp=l.assessment.temperature;

function wordCloudHTML(leads){
  const stop=new Set('the a an and or but to of in on for with at by from is are was were be been being have has had do does did will would can could should not no yes he she it they them his her their our your you i we as this that these those about into over under out up down very more most also them him her can call called spoke said told want wants need needs get got very just now'.split(' '));

  const words=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,40);
  if(!words.length)return '<div class="locked-note">No comment words yet. As the team logs follow-ups, common themes appear here.</div>';
  const max=words[0][1];
  return `<div class="wcloud">${words.map(([w,n])=>{const sz=13+Math.round((n/max)*26);const op=(0.55+0.45*(n/max)).toFixed(2);return `<span style="font-size:${sz}px;opacity:${op}" title="${n}×">${w}</span>`;}).join('')}</div>`;
}

let range={mode:'month'};
function rangeStart(){const d=today();if(range.mode==='month')return new Date(d.getFullYear(),d.getMonth(),1);if(range.mode==='custom')return range.from?parseD(range.from):new Date(2000,0,1);const days=range.mode==='60'?60:range.mode==='90'?90:30;const s=new Date(d);s.setDate(s.getDate()-days+1);return s;}
function rangeEnd(){if(range.mode==='custom'&&range.to)return parseD(range.to);return today();}
function inRange(l){const c=parseD(l.createdAt);return c>=rangeStart()&&c<=rangeEnd();}
function setRange(m){range.mode=m;render();}
function setRangeCustom(){range.mode='custom';range.from=document.getElementById('rg_from').value;range.to=document.getElementById('rg_to').value;render();}
function slaState(l){if(l.stage!=='assigned'||l.qualified!==null)return null;const base=l.assignedAt||l.createdAt;const elapsed=Math.round((today()-parseD(base))/86400000);const left=7-elapsed;return{left,over:left<0};}

  return `<div class="fu-wrap">${Object.entries(byTarget).map(([p,arr])=>sec(p,arr)).join('')}</div>`;
}
/* ============ monthly sales report (Sales Head) ============ */
function setReportMonth(v){reportMonth=v;render();}
function setReportProject(v){reportProject=v;render();}
function rMonthLabel(ym){if(!ym)return '';const p=ym.split('-');return ['','January','February','March','April','May','June','July','August','September','October','November','December'][parseInt(p[1])]+' '+p[0];}
function parseLines(t){return String(t||'').split('\n').map(l=>l.split(',').map(x=>x.trim())).filter(r=>r[0]&&r.some(x=>x!==''));}
function srcCat(l){if(l.source==='walkin')return l.walkinSource==='CP'?'CP':l.walkinSource==='Referral'?'Referral':'Direct';return (l.srcDetail==='Referral')?'Referral':'Digital';}
function reportScope(){let ls=db.leads.slice();if(reportProject!=='All')ls=ls.filter(l=>l.project===reportProject);return ls;}
function crossReasonSlide(title,leads,reasonFn,cats,slide){
  const rs=[...new Set(leads.map(reasonFn).filter(Boolean))];
  if(!rs.length)return slide(title,`<div style="color:#9c8a63">No records this month.</div>`);
  const head=`<tr><th>Source</th>${rs.map(r=>`<th>${r}</th>`).join('')}<th>Total</th></tr>`;
  const body=cats.map(c=>{const cl=leads.filter(l=>srcCat(l)===c);if(!cl.length)return '';const cells=rs.map(r=>`<td class="mono">${cl.filter(l=>reasonFn(l)===r).length}</td>`).join('');return `<tr><td>${c}</td>${cells}<td class="mono"><b>${cl.length}</b></td></tr>`;}).join('');
  return slide(title,`<div style="overflow-x:auto"><table class="rtable">${head}<tbody>${body}</tbody></table></div>`);
}
function reportHTML(){
  if(!reportMonth)reportMonth=iso(today()).slice(0,7);
  const rd=db.reportData||{};
  const all=reportScope();
  const inMonth=all.filter(l=>(l.createdAt||'').slice(0,7)===reportMonth);
  const closures=all.filter(l=>l.stage==='booked'&&l.booking&&(l.booking.at||'').slice(0,7)===reportMonth);
  const cats=['Digital','CP','Direct','Referral'];
  const brand=`<div class="brand">bricks<br>&amp; milestones</div>`;
  const foot=`<div style="text-align:right;color:#9c8a63;font-size:11px;margin-top:14px">www.bricksandmilestones.com</div>`;
  const slide=(title,inner)=>`<div class="report-slide">${brand}<h2>${title}</h2><div class="rule"></div>${inner}${foot}</div>`;
  const projOpts=['All',...PROJECTS].map(p=>`<option ${reportProject===p?'selected':''}>${p}</option>`).join('');
  const toolbar=`<div class="report-toolbar no-print">
    <b style="font-family:'Space Grotesk';font-size:15px">Monthly Sales Review</b>
    <input type="month" class="field" style="width:auto" value="${reportMonth}" onchange="setReportMonth(this.value)"/>
    <select class="field" style="width:auto" onchange="setReportProject(this.value)">${projOpts}</select>
    <button class="btn" onclick="window.print()">🖨 Print / Save as PDF</button>
    <button class="btn ghost" onclick="toggleReportEditor()">Edit external data</button></div>`;
  const editor=`<div class="report-slide no-print" id="reportEditor" style="display:none;background:#fff;border-color:var(--line)">
    <h2 style="color:var(--ink);font-size:18px">External / historical data</h2><div class="rule" style="background:var(--brand)"></div>
    <div class="block"><label>Performance Overview — previous months (one per line: <b>Month, Visits, Sales, Net</b>)</label>
      <textarea class="field" id="rd_perf" style="min-height:90px;font-family:'Space Grotesk'">${(rd.performanceText||'').replace(/</g,'&lt;')}</textarea></div>
    <div class="block"><label>Historic Sales Summary (one per line: <b>Month, 3.5BHK, 3BHK, Units</b>)</label>
      <textarea class="field" id="rd_hist" style="min-height:90px;font-family:'Space Grotesk'">${(rd.historicText||'').replace(/</g,'&lt;')}</textarea></div>
    <button class="btn" onclick="saveReport()">Save external data</button></div>`;
  const titleSlide=`<div class="report-slide" style="text-align:center;padding:48px 30px">${brand}<h2 style="font-size:34px;color:#C0524A">Sales Review — ${rMonthLabel(reportMonth)}</h2><div style="color:#7a5a2a;font-size:15px;margin-top:6px">${reportProject==='All'?'All projects':reportProject} · Bricks &amp; Milestones</div>${foot}</div>`;
  // Performance Overview
  const perfRows=parseLines(rd.performanceText);
  const curVisits=inMonth.length,curSales=closures.length;
  const perfBody=perfRows.map(r=>`<tr><td>${r[0]}</td><td class="mono">${r[1]||''}</td><td class="mono">${r[2]||''}</td><td class="mono">${r[3]||''}</td></tr>`).join('')
    +`<tr style="background:#F3E9D2;font-weight:600"><td>${rMonthLabel(reportMonth)} (live)</td><td class="mono">${curVisits}</td><td class="mono">${curSales}</td><td class="mono">${curSales}</td></tr>`;
  const perfSlide=slide('Performance Overview',`<table class="rtable"><thead><tr><th>Month</th><th>Visits</th><th>Sales</th><th>Net Bookings After Cancellations</th></tr></thead><tbody>${perfBody}</tbody></table>`);
  // Source-wise Visits
  const scnt={};cats.forEach(c=>scnt[c]=0);inMonth.forEach(l=>{scnt[srcCat(l)]=(scnt[srcCat(l)]||0)+1;});
  const smax=Math.max(1,...cats.map(c=>scnt[c]));const stot=inMonth.length||1;
  const topCat=cats.slice().sort((a,b)=>scnt[b]-scnt[a])[0];
  const srcBars=cats.map(c=>`<div class="rbar-row"><div class="rl">${c}</div><div class="rt"><div class="rf" style="width:${Math.round(scnt[c]/smax*100)}%">${scnt[c]}</div></div></div>`).join('');
  const srcSlide=slide('Source-wise Visits',`${srcBars}<div style="margin-top:14px;color:#5a4a2a;font-size:14px">Majority visit contribution: <b>${topCat} (${Math.round(scnt[topCat]/stot*100)}%)</b>.</div>`);
  // CP Contributions
  const cpMap={};inMonth.filter(l=>l.source==='walkin'&&l.walkinSource==='CP').forEach(l=>{const k=l.cpName||'(unnamed CP)';cpMap[k]=(cpMap[k]||0)+1;});
  const cpRows=Object.entries(cpMap).sort((a,b)=>b[1]-a[1]);
  const cpBody=cpRows.length?cpRows.map(([n,c])=>`<tr><td>${n}</td><td class="mono">${c}</td></tr>`).join(''):'<tr><td colspan="2" style="color:#9c8a63">No CP visits this month.</td></tr>';
  const cpSlide=slide('Channel Partner Contributions',`<table class="rtable"><thead><tr><th>Channel Partner</th><th>Visits</th></tr></thead><tbody>${cpBody}</tbody></table>`);
  // Closures
  const realVals=closures.map(l=>l.booking.realization).filter(v=>v);
  const avg=realVals.length?Math.round(realVals.reduce((a,v)=>a+v,0)/realVals.length):0;
  const clHead=`<tr><th>Unit</th><th>Applicant</th><th>Co-applicant</th><th>Age</th><th>SM</th><th>Source</th><th>Sub-source</th><th>Realization</th><th>Size</th><th>Location</th><th>Applicant Co.</th><th>Co-app Co.</th></tr>`;
  const clBody=closures.length?closures.map(l=>{const b=l.booking;return `<tr><td>${b.apartment||'—'}</td><td>${l.name}</td><td>${b.coApplicant||'—'}</td><td class="mono">${b.applicantAge||''}${b.coApplicantAge?' & '+b.coApplicantAge:''}</td><td>${userName(l.ownerId)}</td><td>${srcCat(l)}</td><td>${l.cpName||l.srcDetail||'—'}</td><td class="mono">${b.realization?Number(b.realization).toLocaleString('en-IN'):'—'}</td><td class="mono">${b.size||'—'}</td><td>${b.location||'—'}</td><td>${b.company||'—'}</td><td>${b.coApplicantCompany||'—'}</td></tr>`;}).join(''):'<tr><td colspan="12" style="color:#9c8a63">No closures this month.</td></tr>';
  const clSlide=slide('Closures',`<div style="overflow-x:auto"><table class="rtable" style="font-size:11.5px">${clHead}<tbody>${clBody}</tbody></table></div>${closures.length?`<div style="margin-top:12px;font-family:'Space Grotesk';font-weight:600;color:#5a4a2a">Average Realization — ₹${avg.toLocaleString('en-IN')}</div>`:''}`);
  // Visits — Status Summary
  const statuses=[['Booked','booked'],['Closed-Lost','lost'],['NQ','not_qualified'],['Q','qualified']];
  const statBody=cats.map(c=>{const cl=inMonth.filter(l=>srcCat(l)===c);const cells=statuses.map(([_,st])=>`<td class="mono">${cl.filter(l=>l.stage===st).length}</td>`).join('');return `<tr><td>${c}</td>${cells}<td class="mono"><b>${cl.length}</b></td></tr>`;}).join('');
  const statTot=statuses.map(([_,st])=>`<td class="mono"><b>${inMonth.filter(l=>l.stage===st).length}</b></td>`).join('');
  const statSlide=slide('Visits — Status Summary',`<table class="rtable"><thead><tr><th>Source</th>${statuses.map(s=>`<th>${s[0]}</th>`).join('')}<th>Total</th></tr></thead><tbody>${statBody}<tr style="background:#F3E9D2"><td><b>Total</b></td>${statTot}<td class="mono"><b>${inMonth.length}</b></td></tr></tbody></table>`);
  // NQ & Closed-Lost categories
  const nqSlide=crossReasonSlide('NQ — Categories',inMonth.filter(l=>l.stage==='not_qualified'),l=>l.nqReason,cats,slide);
  const lostSlide=crossReasonSlide('Closed-Lost — Categories',inMonth.filter(l=>l.stage==='lost'),l=>l.lostReason,cats,slide);
  // Historic Sales Summary (external)
  const histRows=parseLines(rd.historicText);let histSlide;
  if(histRows.length){
    const umax=Math.max(1,...histRows.map(r=>numOf(r[3])));
    const body=histRows.map(r=>`<tr><td>${r[0]}</td><td class="mono">${r[1]||'—'}</td><td class="mono">${r[2]||'—'}</td><td class="mono">${r[3]||'—'}</td></tr>`).join('');
    const bars=histRows.map(r=>`<div class="rbar-row"><div class="rl">${r[0]}</div><div class="rt"><div class="rf" style="width:${Math.round(numOf(r[3])/umax*100)}%;background:#C9B27A;color:#4a3a1a">${r[3]||''}</div></div></div>`).join('');
    histSlide=slide('Historic Sales Summary',`<table class="rtable"><thead><tr><th>Month</th><th>3.5 BHK (₹)</th><th>3 BHK (₹)</th><th>Units sold</th></tr></thead><tbody>${body}</tbody></table><div style="margin-top:14px">${bars}</div>`);
  } else histSlide=slide('Historic Sales Summary',`<div style="color:#9c8a63">Add the historic realization trend via <b>Edit external data</b>. Format per line: <b>Month, 3.5BHK, 3BHK, Units</b></div>`);
  return toolbar+editor+titleSlide+perfSlide+histSlide+srcSlide+cpSlide+statSlide+nqSlide+lostSlide+clSlide;
}
function toggleReportEditor(){const e=document.getElementById('reportEditor');if(e)e.style.display=e.style.display==='none'?'':'none';}
async function saveReport(){const rd=Object.assign({},db.reportData||{});rd.performanceText=document.getElementById('rd_perf').value;rd.historicText=document.getElementById('rd_hist').value;if(await saveReportData(rd))render();}
/* ============ alerts / notifications ============ */
function staleQualified(l){if(l.stage!=='qualified')return null;let last=parseD(l.createdAt);(l.log||[]).forEach(e=>{const t=parseD(e.d);if(t>last)last=t;});const days=Math.round((today()-last)/86400000);return days>=7?{days}:null;}
function myProjId(){const u=currentUser();return u&&u.project?projByName[u.project]:null;}
function notifyItems(){
  const u=currentUser();const base=scoped();
  const stale=base.filter(l=>staleQualified(l));
  const overdue=base.filter(l=>{const s=slaState(l);return s&&s.over;});
  const incoming=(db.transfers||[]).filter(t=>t.status==='pending'&&t.to_member===session);
  let pendingT=[],declinedT=[],interests=[],pendingPricing=[];
  if(u&&(u.role==='sales_head'||u.role==='project_head')){
    pendingT=(db.transfers||[]).filter(t=>t.status==='pending'&&t.to_member!==session);
    declinedT=(db.transfers||[]).filter(t=>t.status==='declined'&&t.resolved_at&&(today()-parseD((t.resolved_at||'').slice(0,10)))/86400000<=7);
    const pid=myProjId();
    interests=(db.crossInterest||[]).filter(c=>c.status==='open'&&(u.role==='sales_head'||c.target_project_id===pid));
    pendingPricing=(db.pricingRequests||[]).filter(r=>r.status==='pending');
  }
  const pricedForMe=(db.pricingRequests||[]).filter(r=>r.status==='priced'&&r.requested_by===session);
  const total=stale.length+overdue.length+incoming.length+pendingT.length+declinedT.length+interests.length+pendingPricing.length+pricedForMe.length;
  return {stale,overdue,incoming,pendingT,declinedT,interests,pendingPricing,pricedForMe,total};
}
function refreshNotifyBadge(){const b=document.getElementById('notifyBadge');if(!b)return;const t=notifyItems().total;b.textContent=t?t:'';b.style.display=t?'grid':'none';}
function toggleNotify(){const p=document.getElementById('notifyPanel');if(p.classList.contains('hidden')){renderNotify();p.classList.remove('hidden');}else{p.classList.add('hidden');}}
function closeNotify(){document.getElementById('notifyPanel').classList.add('hidden');}
function renderNotify(){const p=document.getElementById('notifyPanel');const it=notifyItems();
  const row=(l,txt,col)=>`<div class="nrow" onclick="closeNotify();openDrawer('${l.id}')"><div class="ndot" style="background:${col}"></div><div class="nmeta"><b>${l.name}</b><span>${l.project||''} · ${l.ownerId?userName(l.ownerId):'unassigned'} — ${txt}</span></div></div>`;
  const canOpen=id=>db.leads.some(l=>l.id===id);
  let html=`<div class="nhead">Alerts</div>`;
  if(it.incoming.length)html+=`<div class="nsec">Handoffs waiting for you</div>`+it.incoming.map(t=>`<div class="nrow"><div class="ndot" style="background:#4A6FA5"></div><div class="nmeta" style="flex:1"><b>${t.lead_name||'A lead'}</b><span>${userName(t.from_member)} wants to hand this to you${t.note?' — '+t.note:''}</span><div style="margin-top:7px;display:flex;gap:8px"><button class="btn" style="padding:5px 11px" onclick="acceptTransfer('${t.id}')">Accept</button><button class="btn ghost" style="padding:5px 11px" onclick="declineTransfer('${t.id}')">Decline</button></div></div></div>`).join('');
  if(it.pendingPricing&&it.pendingPricing.length)html+=`<div class="nsec">Pricing approvals to set</div>`+it.pendingPricing.map(r=>`<div class="nrow" onclick="closeNotify();openPricing('respond','${r.id}')"><div class="ndot" style="background:#2C9C9A"></div><div class="nmeta"><b>${r.lead_name||''}</b><span>${userName(r.requested_by)} needs prices for ${(r.units||[]).map(x=>x.unit).join(', ')}</span></div></div>`).join('');
  if(it.pricedForMe&&it.pricedForMe.length)html+=`<div class="nsec">Your pricing is ready</div>`+it.pricedForMe.map(r=>`<div class="nrow" onclick="closeNotify();openPricing('view','${r.id}')"><div class="ndot" style="background:#2E9E5B"></div><div class="nmeta"><b>${r.lead_name||''}</b><span>priced by ${userName(r.responded_by)} — tap to view</span></div></div>`).join('');
  if(it.pendingT.length)html+=`<div class="nsec">Handoffs awaiting acceptance</div>`+it.pendingT.map(t=>`<div class="nrow"${canOpen(t.lead_id)?` onclick="closeNotify();openDrawer('${t.lead_id}')"`:''}><div class="ndot" style="background:#E0A32E"></div><div class="nmeta"><b>${t.lead_name||''}</b><span>${userName(t.from_member)} → ${userName(t.to_member)} · not accepted yet</span></div></div>`).join('');
  if(it.declinedT.length)html+=`<div class="nsec">Handoffs declined</div>`+it.declinedT.map(t=>`<div class="nrow"${canOpen(t.lead_id)?` onclick="closeNotify();openDrawer('${t.lead_id}')"`:''}><div class="ndot" style="background:#C0433A"></div><div class="nmeta"><b>${t.lead_name||''}</b><span>${userName(t.to_member)} declined handoff from ${userName(t.from_member)}</span></div></div>`).join('');
  if(it.interests.length)html+=`<div class="nsec">Cross-project interest</div>`+it.interests.map(c=>`<div class="nrow"${canOpen(c.lead_id)?` onclick="closeNotify();openDrawer('${c.lead_id}')"`:''}><div class="ndot" style="background:#7E57C2"></div><div class="nmeta"><b>${c.lead_name||''}</b><span>interested in ${projName(c.target_project_id)||'—'}${c.note?' — '+c.note:''}</span></div></div>`).join('');
  if(it.stale.length)html+=`<div class="nsec">Qualified · no follow-up 7+ days</div>`+it.stale.map(l=>row(l,'no action for '+staleQualified(l).days+'d — book or close it','#C0433A')).join('');
  if(it.overdue.length)html+=`<div class="nsec">Awaiting qualify/disqualify 7+ days</div>`+it.overdue.map(l=>row(l,'decision overdue '+(-slaState(l).left)+'d','#E0A32E')).join('');
  if(!it.total)html+=`<div class="nempty">Nothing needs attention right now.</div>`;
  p.innerHTML=html;}
/* ============ boot ============ */
async function boot(){
  if(IS_SANDBOX){const b=document.createElement('div');b.textContent='● SANDBOX — test environment · not your live data';b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#C0524A;color:#fff;text-align:center;font-family:Inter,sans-serif;font-weight:600;font-size:12px;letter-spacing:.04em;padding:5px;z-index:200';document.body.appendChild(b);document.title='[SANDBOX] '+document.title;}
  pendingInvite=new URLSearchParams(location.search).get('invite');
  const {data:{session:s}}=await sb.auth.getSession();
  if(s){session=s.user.id;const mem=await loadMyMember();
    if(mem){await afterLogin();}
    else if(pendingInvite){loginView={step:'join',err:'',email:s.user.email};showLogin();}
    else{loginView={step:'onboard',err:'',email:s.user.email,company:'Bricks & Milestones'};showLogin();}}
  else{loginView={step:pendingInvite?'signup':'signin',err:'',email:''};showLogin();}
}
boot();
setInterval(function(){if(session){refreshNotifyBadge();const p=document.getElementById('notifyPanel');if(p&&!p.classList.contains('hidden'))renderNotify();}},60000);
</script>
